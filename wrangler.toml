name = "smart-router"
main = "src/index.ts"
compatibility_date = "2025-04-24"

# Durable Object binding for health tracking (circuit breaker)
[[durable_objects.bindings]]
name = "HEALTH_TRACKER"
class_name = "HealthTracker"

[[migrations]]
tag = "v1"
new_classes = ["HealthTracker"]

# D1 database for plan storage
[[d1_databases]]
binding = "DB"
database_name = "smart-router-db"
database_id = "00000000-0000-0000-0000-000000000000"
